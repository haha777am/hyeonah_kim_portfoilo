<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COLLABORATION — HYEON AH KIM</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=Noto+Sans+KR:wght@300;400&display=swap" rel="stylesheet">
    <style>
        /* [1] 공통 테마 */
        body { 
            margin: 0; 
            background-color: #000; 
            color: #fff; 
            font-family: 'Noto Sans KR', sans-serif; 
            overflow-x: hidden; 
        }
        
        /* [2] 네비게이션 (일관된 디자인 유지) */
        header { 
            position: fixed; top: 0; width: 100%; z-index: 1000; 
            padding: 40px 0; display: flex; justify-content: center; 
        }
        .nav-capsule { 
            display: flex; background: rgba(255,255,255,0.08); 
            border-radius: 50px; padding: 6px; backdrop-filter: blur(15px); 
            border: 1px solid rgba(255,255,255,0.1); 
        }
        .nav-capsule a { 
            text-decoration: none; color: #777; padding: 10px 25px; 
            border-radius: 50px; font-size: 13px; transition: 0.3s; 
        }
        .nav-capsule a:hover { color: #fff; }
        .nav-capsule a.active { color: #fff; background: rgba(255,255,255,0.15); }

        /* [3] 레이아웃 컨테이너 */
        .container { 
            padding: 180px 10% 100px; 
            max-width: 1400px; 
            margin: 0 auto; 
        }
        .page-title { 
            font-family: 'Playfair Display', serif; 
            font-size: 5vw; 
            margin-bottom: 80px; 
            font-weight: 400; 
            letter-spacing: -2px; 
            animation: fadeIn 1s ease forwards;
        }

        /* [4] 협업 리스트 인터페이스 */
        .archive-list { 
            border-top: 1px solid #222; 
            animation: fadeIn 1.2s ease forwards;
        }
        
        .archive-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 40px 0; border-bottom: 1px solid #222;
            text-decoration: none; color: #fff; 
            transition: 0.5s cubic-bezier(0.19, 1, 0.22, 1);
            position: relative;
        }

        .archive-item:hover { 
            border-bottom-color: #fff; 
            padding-left: 20px; 
        }

        .item-name { 
            font-family: 'Playfair Display', serif; 
            font-size: 3.5vw; 
            line-height: 1; 
            transition: 0.4s; 
        }
        .archive-item:hover .item-name { 
            font-style: italic; 
        }
        
        .item-city { 
            font-family: monospace; 
            color: #444; 
            font-size: 16px; 
            letter-spacing: 2px; 
            transition: 0.4s; 
            text-transform: uppercase;
        }
        .archive-item:hover .item-city { 
            color: #fff; 
        }

        /* [5] 호버 시 나타나는 이미지 프리뷰 (가로형 최적화) */
        .preview {
            position: fixed; 
            top: 50%; 
            right: 12%; 
            transform: translateY(-50%) scale(0.8);
            width: 450px; 
            height: 320px; 
            opacity: 0; 
            pointer-events: none;
            transition: 0.6s cubic-bezier(0.19, 1, 0.22, 1); 
            z-index: 5;
        }
        .preview img { 
            width: 100%; height: 100%; 
            object-fit: cover; 
            filter: grayscale(1); 
            background: #111;
        }
        
        .archive-item:hover .preview { 
            opacity: 1; 
            transform: translateY(-50%) scale(1); 
        }
        .archive-item:hover .preview img {
            filter: grayscale(0.2);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 모바일 대응 */
        @media (max-width: 768px) {
            .item-name { font-size: 8vw; }
            .preview { display: none; } /* 모바일에서는 프리뷰 생략 */
        }
    </style>
</head>
<body>

    <header>
        <div class="nav-capsule">
            <a href="index.html">HOME</a>
            <a href="work.html">WORK</a>
            <a href="artshow.html">ART SHOW</a>
            <a href="collabration.html" class="active">COLLAB</a>
            <a href="cv.html">C.V</a>
        </div>
    </header>

    <main class="container">
        <h1 class="page-title">Collaborations</h1>
        
        <div class="archive-list">
            
            <a href="#" class="archive-item">
                <span class="item-name">Seoul Exhibition</span>
                <span class="item-city">KOREA</span>
                <div class="preview"><img src="images/collab_seoul.jpg" alt="Seoul Collaboration"></div>
            </a>

            <a href="#" class="archive-item">
                <span class="item-name">Gyeomson</span>
                <span class="item-city">PARTNERSHIP</span>
                <div class="preview"><img src="images/collab_gyeomson.jpg" alt="Gyeomson Partnership"></div>
            </a>

            <a href="#" class="archive-item">
                <span class="item-name">Insooth</span>
                <span class="item-city">CREATIVE</span>
                <div class="preview"><img src="images/collab_insooth.jpg" alt="Insooth Collaboration"></div>
            </a>

        </div>
    </main>

</body>
</html>
