<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HYEON AH KIM — HOME</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Noto+Sans+KR:wght@300;400&display=swap" rel="stylesheet">
    <style>
        /* [1] 기본 테마 */
        body {
            margin: 0; padding: 0;
            background-color: #000; color: #fff;
            font-family: 'Noto Sans KR', sans-serif;
            overflow: hidden; /* 메인 화면은 깔끔하게 고정 */
        }

        /* [2] 네비게이션 (캡슐 스타일) */
        header {
            position: fixed; top: 0; width: 100%; z-index: 1000;
            padding: 40px 0; display: flex; justify-content: center;
        }
        .nav-capsule {
            display: flex; background: rgba(255,255,255,0.08);
            border-radius: 50px; padding: 6px; backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .nav-capsule a {
            text-decoration: none; color: #777; padding: 10px 25px;
            border-radius: 50px; font-size: 13px; letter-spacing: 1px;
            transition: 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }
        /* 현재 페이지 활성화 */
        .nav-capsule a.active, .nav-capsule a:hover {
            color: #fff; background: rgba(255,255,255,0.15);
        }

        /* [3] 메인 인트로 레이아웃 */
        .main-intro {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 10%;
        }

        /* 왼쪽: 타이틀 영역 */
        .intro-left { flex: 1.2; }
        .brand-title {
            font-family: 'Playfair Display', serif;
            font-size: 8.5vw;
            line-height: 0.9;
            margin: 0;
            letter-spacing: -3px;
            font-weight: 400;
        }
        .brand-subtitle {
            font-family: monospace;
            color: #555;
            font-size: 14px;
            margin-top: 30px;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        /* 오른쪽: 비주얼 영역 */
        .intro-right {
            flex: 0.8;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            text-align: right;
        }
        .circle-image-wrap {
            width: 25vw;
            height: 25vw;
            max-width: 450px; max-height: 450px;
            border-radius: 50%;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.2);
            margin-bottom: 30px;
            transition: transform 1s cubic-bezier(0.19, 1, 0.22, 1);
            background: #111; /* 이미지 로딩 전 박스 */
        }
        .circle-image-wrap:hover {
            transform: scale(1.02) rotate(2deg);
        }
        .circle-image-wrap img {
            width: 100%; height: 100%; object-fit: cover;
            filter: grayscale(1); transition: 1s;
        }
        .circle-image-wrap:hover img {
            filter: grayscale(0);
        }
        .intro-desc {
            font-size: 14px;
            color: #888;
            line-height: 1.8;
            font-weight: 300;
            letter-spacing: 0.5px;
        }

        /* 페이드 인 애니메이션 */
        .fade-in {
            animation: fadeIn 1.5s ease forwards;
            opacity: 0;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <header>
        <div class="nav-capsule">
            <a href="index.html" class="active">HOME</a>
            <a href="work.html">WORK</a>
            <a href="artshow.html">ART SHOW</a>
            <a href="collab.html">COLLAB</a>
            <a href="cv.html">C.V</a>
        </div>
    </header>

    <main class="main-intro">
        <div class="intro-left fade-in">
            <h1 class="brand-title">Hyeon Ah<br>Kim</h1>
            <p class="brand-subtitle">Archive & Creative Direction</p>
        </div>
        
        <div class="intro-right fade-in" style="animation-delay: 0.3s;">
            <div class="circle-image-wrap">
                <img src="images/main-focus.jpg" alt="Art Show Directing">
            </div>
            <p class="intro-desc">
                Archive / Structure / Reconstruction<br>
                시각적 스토리텔링을 통한<br>
                패션과 예술의 재구성
            </p>
        </div>
    </main>

</body>
</html>
