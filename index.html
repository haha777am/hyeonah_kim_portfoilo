<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HYEON AH KIM — ARCHIVE</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Noto+Sans+KR:wght@300;400&display=swap" rel="stylesheet">
    
    <style>
        /* [1] CSS 초기화 및 공통 스타일 */
        body {
            margin: 0; padding: 0;
            background-color: #000; color: #fff;
            font-family: 'Noto Sans KR', sans-serif;
            /* 👉 디테일 수정: 모바일/작은 화면을 위해 가로 스크롤만 숨김 */
            overflow-x: hidden; 
        }

        /* [2] 네비게이션 (전 페이지 통일 디자인) */
        header {
            position: fixed; top: 0; width: 100%; z-index: 1000;
            padding: 40px 0; display: flex; justify-content: center;
        }
        .nav-capsule {
            display: flex; background: rgba(255,255,255,0.08);
            border-radius: 50px; padding: 6px; backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .nav-capsule a {
            text-decoration: none; color: #777; padding: 10px 25px;
            border-radius: 50px; font-size: 13px; letter-spacing: 1px;
            transition: 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }
        .nav-capsule a:hover { color: #fff; }
        .nav-capsule a.active {
            color: #fff; background: rgba(255,255,255,0.15);
        }

        /* [3] 메인 인트로 레이아웃 (가로 2단 구성) */
        .main-intro {
            /* 화면 높이에 딱 맞추되, 내용이 길어지면 여백을 주도록 수정 */
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 100px 10%; /* 위아래 패딩 추가 */
            box-sizing: border-box;
        }

        /* 왼쪽: 타이틀 영역 */
        .intro-left { flex: 1.2; }
        .brand-title {
            font-family: 'Playfair Display', serif;
            font-size: 8.5vw;
            line-height: 0.9;
            margin: 0;
            letter-spacing: -3px;
            font-weight: 400;
        }
        .brand-subtitle {
            font-family: monospace;
            color: #444;
            font-size: 14px;
            margin-top: 30px;
            letter-spacing: 4px;
        }

        /* 오른쪽: 원형 이미지 영역 */
        .intro-right {
            flex: 0.8;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            text-align: right;
        }
        .circle-image-wrap {
            width: 25vw;
            height: 25vw;
            max-width: 450px; max-height: 450px;
            border-radius: 50%;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.2);
            margin-bottom: 35px;
            transition: 1s cubic-bezier(0.19, 1, 0.22, 1);
        }
        .circle-image-wrap:hover {
            transform: scale(1.03) rotate(2deg);
        }
        .circle-image-wrap img {
            width: 100%; height: 100%; object-fit: cover;
        }
        .intro-desc {
            font-size: 14px;
            color: #777;
            line-height: 2;
            font-weight: 300;
            letter-spacing: 0.5px;
        }

        /* [4] 페이드 인 애니메이션 */
        .fade-in {
            opacity: 0;
            animation: fadeIn 1.5s ease forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* [5] 모바일 반응형 대응 */
        @media (max-width: 768px) {
            .main-intro { 
                flex-direction: column; 
                justify-content: center; 
                text-align: center; 
                padding-top: 150px; /* 모바일에서 네비게이션에 안 가려지게 여백 확보 */
            }
            .intro-left { margin-bottom: 50px; }
            .intro-right { align-items: center; text-align: center; }
            .brand-title { font-size: 18vw; }
            .circle-image-wrap { width: 60vw; height: 60vw; }
        }
    </style>
</head>
<body>

    <header>
        <div class="nav-capsule">
            <a href="index.html" class="active">HOME</a>
            <a href="work.html">WORK</a>
            <a href="artshow.html">ART SHOW</a>
            <a href="collab.html">COLLAB</a>
            <a href="cv.html">C.V</a>
        </div>
    </header>

    <main class="main-intro">
        <div class="intro-left fade-in">
            <h1 class="brand-title">Hyeon Ah<br>Kim</h1>
            <p class="brand-subtitle">ARCHIVE & DIRECTION</p>
        </div>
        
        <div class="intro-right fade-in" style="animation-delay: 0.3s;">
            <div class="circle-image-wrap">
                <img src="images/main-focus.jpg" alt="Art Show Directing">
            </div>
            <p class="intro-desc">
                Archive / Structure / Reconstruction<br>
                Fashion & Art Exhibition Combined<br>
                Visual Storytelling Directing
            </p>
        </div>
    </main>

</body>
</html>
