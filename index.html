<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta property="og:type" content="website">
    <meta property="og:title" content="HYEON AH KIM — CREATIVE DIRECTION">
    <meta property="og:description" content="Fashion Designer & Art Show Director. Archive / Structure / Reconstruction.">
    <meta property="og:image" content="https://haha777am.github.io/hyeonah_kim/images/main-focus.jpg">
    <meta property="og:url" content="https://haha777am.github.io/hyeonah_kim/">
    
    <meta name="twitter:card" content="summary_large_image">
    
    <title>HYEON AH KIM — ARCHIVE</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Noto+Sans+KR:wght@300;400&display=swap" rel="stylesheet">
    <style>
        /* [1] CSS 초기화 및 공통 스타일 */
        body {
            margin: 0; padding: 0;
            background-color: #000; color: #fff;
            font-family: 'Noto Sans KR', sans-serif;
            overflow-x: hidden; 
            cursor: none; 
            animation: fadeInPage 0.8s ease forwards;
        }

        @keyframes fadeInPage { from { opacity: 0; } to { opacity: 1; } }
        body.fade-out { opacity: 0 !important; transition: opacity 0.5s ease; }

        /* 커스텀 커서 스타일 */
        .custom-cursor {
            position: fixed; top: 0; left: 0; width: 12px; height: 12px;
            background-color: #fff; border-radius: 50%; pointer-events: none; z-index: 9999;
            transform: translate(-50%, -50%); transition: width 0.3s ease, height 0.3s ease, background-color 0.3s ease; mix-blend-mode: difference;
        }
        .custom-cursor.hover { width: 45px; height: 45px; background-color: transparent; border: 1px solid #fff; }

        /* [2] 네비게이션 */
        header {
            position: fixed; top: 0; width: 100%; z-index: 1000;
            padding: 40px 0; display: flex; justify-content: center;
        }
        .nav-capsule {
            display: flex; background: rgba(255,255,255,0.08);
            border-radius: 50px; padding: 6px; backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .nav-capsule a {
            text-decoration: none; color: #777; padding: 10px 25px;
            border-radius: 50px; font-size: 13px; letter-spacing: 1px;
            transition: 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }
        .nav-capsule a:hover { color: #fff; }
        .nav-capsule a.active { color: #fff; background: rgba(255,255,255,0.15); }

        /* [3] 메인 인트로 레이아웃 */
        .main-intro {
            height: 100vh; display: flex; align-items: center;
            justify-content: space-between; padding: 0 10%;
        }

        .intro-left { flex: 1.2; }
        .brand-title {
            font-family: 'Playfair Display', serif;
            font-size: 7.5vw; line-height: 1.2; margin: 0;
            letter-spacing: -3px; font-weight: 400;
        }
        .brand-subtitle {
            font-family: monospace; color: #444; font-size: 14px;
            margin-top: 30px; letter-spacing: 4px;
        }

        .intro-right {
            flex: 0.8; display: flex; flex-direction: column;
            align-items: flex-end; text-align: right;
        }
        .circle-image-wrap {
            width: 25vw; height: 25vw;
            max-width: 450px; max-height: 450px;
            border-radius: 50%; overflow: hidden;
            border: 1px solid rgba(255,255,255,0.2);
            margin-bottom: 35px; transition: 1s cubic-bezier(0.19, 1, 0.22, 1);
        }
        .circle-image-wrap:hover { transform: scale(1.03) rotate(2deg); }

        /* 이미지 스타일 */
        .circle-image-wrap img {
            width: 100%; height: 100%; object-fit: cover;
            filter: grayscale(100%); transition: 0.8s ease;
        }
        .circle-image-wrap:hover img { filter: grayscale(0%); }

        .intro-desc {
            font-size: 14px; color: #777; line-height: 2;
            font-weight: 300; letter-spacing: 0.5px;
        }

        .fade-in { opacity: 0; animation: fadeIn 1.5s ease forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 768px) {
            .main-intro { flex-direction: column; justify-content: center; text-align: center; }
            .intro-left { margin-bottom: 50px; }
            .intro-right { align-items: center; text-align: center; }
            .brand-title { font-size: 18vw; }
            .circle-image-wrap { width: 60vw; height: 60vw; }
            .custom-cursor { display: none; }
            body { cursor: auto; }
        }
    </style>
</head>
<body>

    <div class="custom-cursor"></div>

    <header>
        <div class="nav-capsule">
            <a href="index.html" class="active">HOME</a>
            <a href="work.html">WORK</a>
            <a href="artshow.html">ART SHOW</a>
            <a href="collab.html">COLLAB</a>
            <a href="cv.html">C.V</a>
        </div>
    </header>

    <main class="main-intro">
        <div class="intro-left fade-in">
            <h1 class="brand-title">Hyeon Ah<br>Kim</h1>
            <p class="brand-subtitle">fashion desinger</p>
        </div>
        
        <div class="intro-right fade-in" style="animation-delay: 0.3s;">
            <div class="circle-image-wrap">
                <img src="images/profile.jpg.jpg" alt="Profile Image">
            </div>
            <p class="intro-desc">
                Archive / Structure / Reconstruction<br>
                아카이브 / 구조 / 재구성<br>
                
            </p>
        </div>
    </main>

    <script>
        const cursor = document.querySelector('.custom-cursor');
        const links = document.querySelectorAll('a');

        // [1] 커서 움직임 및 링크 호버 효과
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        links.forEach(link => {
            link.addEventListener('mouseenter', () => { cursor.classList.add('hover'); });
            link.addEventListener('mouseleave', () => { cursor.classList.remove('hover'); });
            
            // [2] 링크 클릭 시 페이드 아웃 후 이동
            link.addEventListener('click', function(e) {
                if (this.target === '_blank' || this.getAttribute('href').startsWith('#') || this.getAttribute('href').startsWith('mailto:')) return;

                e.preventDefault();
                const targetUrl = this.href;
                document.body.classList.add('fade-out');

                setTimeout(() => {
                    window.location.href = targetUrl;
                }, 500);
            });
        });

        // [3] 뒤로 가기 시 화면이 안 뜨는 문제 해결 (핵심!)
        window.addEventListener('pageshow', function(event) {
            if (event.persisted || (window.performance && window.performance.navigation.type === 2)) {
                document.body.classList.remove('fade-out');
            }
        });
    </script>
</body>
</html>
