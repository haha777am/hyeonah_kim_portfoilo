<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COLLABORATION — HYEON AH KIM</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=Noto+Sans+KR:wght@300;400&display=swap" rel="stylesheet">
    <style>
        /* [1] 기본 테마: 다크 아카이브 무드 */
        body { 
            margin: 0; 
            background-color: #000; 
            color: #fff; 
            font-family: 'Noto Sans KR', sans-serif; 
            overflow-x: hidden; 
        }
        
        /* [2] 네비게이션 */
        header { 
            position: fixed; top: 0; width: 100%; z-index: 1000; 
            padding: 40px 0; display: flex; justify-content: center; 
        }
        .nav-capsule { 
            display: flex; background: rgba(255,255,255,0.08); 
            border-radius: 50px; padding: 6px; backdrop-filter: blur(15px); 
            border: 1px solid rgba(255,255,255,0.1); 
        }
        .nav-capsule a { 
            text-decoration: none; color: #777; padding: 10px 25px; 
            border-radius: 50px; font-size: 13px; transition: 0.3s; 
        }
        .nav-capsule a:hover { color: #fff; }
        .nav-capsule a.active { color: #fff; background: rgba(255,255,255,0.15); }

        /* [3] 레이아웃 컨테이너 */
        .container { 
            padding: 180px 5% 100px; 
            max-width: 1600px; 
            margin: 0 auto; 
        }
        .page-title { 
            font-family: 'Playfair Display', serif; 
            font-size: 5vw; 
            margin-bottom: 60px; 
            font-weight: 400; 
            letter-spacing: -2px; 
            animation: fadeIn 1s ease forwards;
            text-align: center; 
        }

        /* [4] 이미지 갤러리 그리드 (3분할) */
        .archive-grid { 
            display: grid;
            grid-template-columns: repeat(3, 1fr); 
            gap: 15px; 
            animation: fadeIn 1.2s ease forwards;
        }

        /* 사진 항목 (카드형태) */
        .grid-item {
            position: relative;
            display: block;
            overflow: hidden;
            text-decoration: none;
            background: #111;
            aspect-ratio: 4 / 5; /* 세로형 비율 */
        }

        /* 가로로 꽉 차게 만들고 싶을 때 사용하는 클래스 */
        .grid-item.span-full {
            grid-column: 1 / -1; 
            aspect-ratio: 21 / 9; 
        }

        /* 이미지 스타일 설정 */
        .grid-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(100%); /* 기본 흑백 */
            transition: transform 0.8s cubic-bezier(0.19, 1, 0.22, 1), filter 0.8s ease;
        }

        /* 텍스트 정보 (호버 시 아래에서 올라옴) */
        .item-info {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 30px;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
            box-sizing: border-box;
            transform: translateY(20px);
            opacity: 0;
            transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1);
        }

        /* 호버 효과 */
        .grid-item:hover img {
            transform: scale(1.05); 
            filter: grayscale(0%); 
        }
        .grid-item:hover .item-info {
            transform: translateY(0);
            opacity: 1;
        }

        /* 텍스트 디테일 */
        .item-title { 
            font-family: 'Playfair Display', serif; 
            font-size: 28px; 
            color: #fff;
            margin-bottom: 5px;
            display: block;
        }
        .item-meta { 
            font-family: monospace; 
            color: #aaa; 
            font-size: 14px; 
            letter-spacing: 2px; 
            text-transform: uppercase;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 모바일 대응 */
        @media (max-width: 768px) {
            .page-title { font-size: 10vw; margin-bottom: 40px; }
            .archive-grid { grid-template-columns: 1fr; } 
            .grid-item, .grid-item.span-full {
                grid-column: 1 / -1; 
                aspect-ratio: 4 / 5;
            }
            .item-info {
                opacity: 1; 
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="nav-capsule">
            <a href="index.html">HOME</a>
            <a href="work.html">WORK</a>
            <a href="artshow.html">ART SHOW</a>
            <a href="collab.html" class="active">COLLAB</a>
            <a href="cv.html">C.V</a>
        </div>
    </header>

    <main class="container">
        <h1 class="page-title">Collaborations</h1>
        
        <div class="archive-grid">
            
            <a href="#" class="grid-item">
                <img src="images/collab_seoul.jpg" alt="Seoul Collaboration">
                <div class="item-info">
                    <span class="item-title">Seoul Exhibition</span>
                    <span class="item-meta">KOREA</span>
                </div>
            </a>

            <a href="#" class="grid-item">
                <img src="images/collab_gyeomson.jpg" alt="Gyeomson Partnership">
                <div class="item-info">
                    <span class="item-title">Gyeomson</span>
                    <span class="item-meta">PARTNERSHIP</span>
                </div>
            </a>

            <a href="#" class="grid-item">
                <img src="images/collab_insooth.jpg" alt="Insooth Collaboration">
                <div class="item-info">
                    <span class="item-title">Insooth</span>
                    <span class="item-meta">CREATIVE</span>
                </div>
            </a>

        </div>
    </main>

</body>
</html>
