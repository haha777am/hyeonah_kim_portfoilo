<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WORK — HYEON AH KIM</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=Noto+Sans+KR:wght@300;400&display=swap" rel="stylesheet">
    <style>
        /* [1] 기본 테마 및 페이지 전환 효과 */
        body { 
            margin: 0; 
            background-color: #000; 
            color: #fff; 
            font-family: 'Noto Sans KR', sans-serif; 
            overflow-x: hidden; 
            cursor: none; /* 기본 마우스 숨기기 */
            animation: fadeInPage 0.8s ease forwards;
        }
        
        @keyframes fadeInPage { from { opacity: 0; } to { opacity: 1; } }
        body.fade-out { opacity: 0 !important; transition: opacity 0.5s ease; }

        /* 커스텀 커서 스타일 */
        .custom-cursor {
            position: fixed; top: 0; left: 0; width: 12px; height: 12px;
            background-color: #fff; border-radius: 50%; pointer-events: none; z-index: 9999;
            transform: translate(-50%, -50%); transition: width 0.3s ease, height 0.3s ease, background-color 0.3s ease; mix-blend-mode: difference;
        }
        .custom-cursor.hover { width: 45px; height: 45px; background-color: transparent; border: 1px solid #fff; }

        /* [2] 네비게이션 */
        header { 
            position: fixed; top: 0; width: 100%; z-index: 1000; 
            padding: 40px 0; display: flex; justify-content: center; 
        }
        .nav-capsule { 
            display: flex; background: rgba(255,255,255,0.08); 
            border-radius: 50px; padding: 6px; backdrop-filter: blur(15px); 
            border: 1px solid rgba(255,255,255,0.1); 
        }
        .nav-capsule a { 
            text-decoration: none; color: #777; padding: 10px 25px; 
            border-radius: 50px; font-size: 13px; transition: 0.3s; 
        }
        .nav-capsule a:hover { color: #fff; }
        .nav-capsule a.active { color: #fff; background: rgba(255,255,255,0.15); }

        /* [3] 레이아웃 컨테이너 */
        .container { 
            padding: 180px 5% 100px;
            max-width: 1600px; margin: 0 auto; 
        }
        .page-title { 
            font-family: 'Playfair Display', serif; font-size: 4vw; 
            margin-bottom: 60px; font-weight: 400; letter-spacing: -2px; 
            animation: fadeInPage 1s ease forwards; text-align: center; 
        }

        /* [4] 이미지 갤러리 그리드 */
        .archive-grid { 
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; 
        }

        .grid-item {
            position: relative; display: block; overflow: hidden; text-decoration: none;
            background: #111; aspect-ratio: 4 / 5;
        }
        .grid-item.span-full {
            grid-column: 1 / -1; aspect-ratio: 21 / 9;
        }

        .grid-item img {
            width: 100%; height: 100%; object-fit: cover; filter: grayscale(100%); 
            transition: transform 0.8s cubic-bezier(0.19, 1, 0.22, 1), filter 0.8s ease;
        }

        .item-info {
            position: absolute; bottom: 0; left: 0; width: 100%; padding: 30px;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
            box-sizing: border-box; transform: translateY(20px); opacity: 0;
            transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1);
        }

        .grid-item:hover img { transform: scale(1.05); filter: grayscale(0%); }
        .grid-item:hover .item-info { transform: translateY(0); opacity: 1; }

        .item-title { 
            font-family: 'Playfair Display', serif; font-size: 28px; color: #fff;
            margin-bottom: 5px; display: block;
        }
        .item-meta { 
            font-family: monospace; color: #aaa; font-size: 12px; 
            letter-spacing: 1px; text-transform: uppercase;
        }

        /* 모바일 대응 */
        @media (max-width: 768px) {
            .page-title { font-size: 8vw; margin-bottom: 40px; }
            .archive-grid { grid-template-columns: 1fr; } 
            .grid-item, .grid-item.span-full { grid-column: 1 / -1; aspect-ratio: 4 / 5; }
            .item-info { opacity: 1; transform: translateY(0); }
            .custom-cursor { display: none; }
            body { cursor: auto; }
        }
    </style>
</head>
<body>

    <div class="custom-cursor"></div>

    <header>
        <div class="nav-capsule">
            <a href="index.html">HOME</a>
            <a href="work.html" class="active">WORK</a>
            <a href="artshow.html">ART SHOW</a>
            <a href="collab.html">COLLAB</a>
            <a href="cv.html">C.V</a>
        </div>
    </header>

    <main class="container">
        <h1 class="page-title">Selected Works</h1>
        
        <div class="archive-grid">
            
            <a href="26fw.html" class="grid-item span-full">
                <img src="images/2026fw/main.jpg" alt="26FW Collection">
                <div class="item-info">
                    <span class="item-title">26FW Collection</span>
                    <span class="item-meta">Fashion / Archive / 2026</span>
                </div>
            </a>

            <a href="#" class="grid-item">
                <img src="images/2026ss/main.jpg" alt="26SS Collection">
                <div class="item-info">
                    <span class="item-title">26SS Collection</span>
                    <span class="item-meta">Fashion / Archive / 2026</span>
                </div>
            </a>

            <a href="#" class="grid-item">
                <img src="images/2025fw/main.jpg" alt="25FW Collection">
                <div class="item-info">
                    <span class="item-title">25FW Collection</span>
                    <span class="item-meta">Fashion / Archive / 2025</span>
                </div>
            </a>

            <a href="#" class="grid-item">
                <img src="images/2024fw/main.jpg" alt="24FW Collection">
                <div class="item-info">
                    <span class="item-title">24FW Collection</span>
                    <span class="item-meta">Fashion / Archive / 2024</span>
                </div>
            </a>

        </div>
    </main>

    <script>
        const cursor = document.querySelector('.custom-cursor');
        const links = document.querySelectorAll('a');

        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        links.forEach(link => {
            link.addEventListener('mouseenter', () => { cursor.classList.add('hover'); });
            link.addEventListener('mouseleave', () => { cursor.classList.remove('hover'); });
            
            link.addEventListener('click', function(e) {
                if (this.target === '_blank' || this.getAttribute('href').startsWith('mailto:')) return;
                e.preventDefault();
                const targetUrl = this.href;
                document.body.classList.add('fade-out');
                setTimeout(() => {
                    window.location.href = targetUrl;
                }, 500); 
            });
        });
    </script>
</body>
</html>
