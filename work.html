<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WORK - HYEON AH KIM</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=Noto+Sans+KR:wght@300;400&display=swap" rel="stylesheet">
    <style>
        /* [1] 기본 테마: 영상 속 다크 아카이브 무드 */
        body { margin: 0; background-color: #000; color: #fff; font-family: 'Noto Sans KR', sans-serif; overflow-x: hidden; }
        
        /* [2] 네비게이션: 클릭이 안 되던 HOME 링크 수정 */
        header { position: fixed; top: 0; width: 100%; z-index: 1000; padding: 30px 0; display: flex; justify-content: center; }
        .nav-capsule { display: flex; background: rgba(255,255,255,0.08); border-radius: 50px; padding: 5px; backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); }
        .nav-capsule a { text-decoration: none; color: #666; padding: 10px 25px; border-radius: 50px; font-size: 13px; transition: 0.3s; }
        .nav-capsule a:hover { color: #fff; }
        .nav-capsule a.active { color: #fff; background: rgba(255,255,255,0.15); }

        /* [3] 레이아웃 컨테이너 */
        .container { padding: 180px 10% 100px; max-width: 1400px; margin: 0 auto; }
        .page-title { font-family: 'Playfair Display', serif; font-size: 4vw; margin-bottom: 80px; font-weight: 400; letter-spacing: -2px; }

        /* [4] 워크 리스트: 영상 속 그 텍스트 인터페이스 */
        .archive-list { border-top: 1px solid #222; }
        
        .archive-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 45px 0; border-bottom: 1px solid #222;
            text-decoration: none; color: #fff; 
            transition: 0.5s cubic-bezier(0.19, 1, 0.22, 1);
            position: relative;
        }

        /* 호버 시 텍스트 기울기 및 여백 효과 */
        .archive-item:hover { border-bottom-color: #fff; padding-left: 20px; }

        .item-title { font-family: 'Playfair Display', serif; font-size: 3.5vw; line-height: 1; transition: 0.4s; }
        .archive-item:hover .item-title { font-style: italic; }
        
        .item-meta { font-family: monospace; color: #444; font-size: 14px; letter-spacing: 2px; transition: 0.4s; }
        .archive-item:hover .item-meta { color: #fff; }

        /* [5] 호버 시 나타나는 이미지 프리뷰 (영상 속 그 느낌) */
        .preview {
            position: fixed; top: 50%; right: 10%; transform: translateY(-50%) scale(0.8);
            width: 350px; height: 500px; opacity: 0; pointer-events: none;
            transition: 0.6s cubic-bezier(0.19, 1, 0.22, 1); z-index: 5;
            background: #111; /* 이미지 없을 때 대비 */
        }
        .preview img { width: 100%; height: 100%; object-fit: cover; filter: grayscale(20%); }
        
        /* 호버 시 프리뷰 등장 */
        .archive-item:hover .preview { opacity: 1; right: 15%; transform: translateY(-50%) scale(1); }
    </style>
</head>
<body>

    <header>
        <div class="nav-capsule">
            <a href="index.html">HOME</a>
            <a href="work.html" class="active">WORK</a>
            <a href="artshow.html">ART SHOW</a>
            <a href="collab.html">COLLAB</a>
            <a href="cv.html">C.V</a>
        </div>
    </header>

    <main class="container">
        <h1 class="page-title">Selected Works</h1>
        
        <div class="archive-list">
            
            <a href="26fw.html" class="archive-item">
                <span class="item-title">26FW Collection</span>
                <span class="item-meta">2024 / FASHION</span>
                <div class="preview"><img src="thumb_26fw.jpg" alt="26FW"></div>
            </a>

            <a href="#" class="archive-item">
                <span class="item-title">26SS Collection</span>
                <span class="item-meta">2024 / FASHION</span>
                <div class="preview"><img src="thumb_26ss.jpg" alt="26SS"></div>
            </a>

            <a href="#" class="archive-item">
                <span class="item-title">25FW Collection</span>
                <span class="item-meta">2023 / FASHION</span>
                <div class="preview"><img src="thumb_25fw.jpg" alt="25FW"></div>
            </a>

            <a href="#" class="archive-item">
                <span class="item-title">25SS Collection</span>
                <span class="item-meta">2023 / FASHION</span>
                <div class="preview"><img src="thumb_25ss.jpg" alt="25SS"></div>
            </a>

            <a href="#" class="archive-item">
                <span class="item-title">Retail Store Layout</span>
                <span class="item-meta">2022 / 3D SPACE</span>
                <div class="preview"><img src="thumb_retail.jpg" alt="Retail Store"></div>
            </a>

        </div>
    </main>

</body>
</html>
