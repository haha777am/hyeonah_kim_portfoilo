<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WORK — HYEON AH KIM</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=Noto+Sans+KR:wght@300;400&display=swap" rel="stylesheet">
    <style>
        /* [1] 기본 테마: 다크 아카이브 무드 */
        body { 
            margin: 0; 
            background-color: #000; 
            color: #fff; 
            font-family: 'Noto Sans KR', sans-serif; 
            overflow-x: hidden; 
        }
        
        /* [2] 네비게이션 (HOME과 동일한 스타일) */
        header { 
            position: fixed; top: 0; width: 100%; z-index: 1000; 
            padding: 40px 0; display: flex; justify-content: center; 
        }
        .nav-capsule { 
            display: flex; background: rgba(255,255,255,0.08); 
            border-radius: 50px; padding: 6px; backdrop-filter: blur(15px); 
            border: 1px solid rgba(255,255,255,0.1); 
        }
        .nav-capsule a { 
            text-decoration: none; color: #777; padding: 10px 25px; 
            border-radius: 50px; font-size: 13px; transition: 0.3s; 
        }
        .nav-capsule a:hover { color: #fff; }
        .nav-capsule a.active { color: #fff; background: rgba(255,255,255,0.15); }

        /* [3] 레이아웃 컨테이너 */
        .container { 
            padding: 180px 10% 100px; 
            max-width: 1400px; 
            margin: 0 auto; 
        }
        .page-title { 
            font-family: 'Playfair Display', serif; 
            font-size: 4vw; 
            margin-bottom: 80px; 
            font-weight: 400; 
            letter-spacing: -2px; 
            animation: fadeIn 1s ease forwards;
        }

        /* [4] 워크 리스트: 텍스트 기반 인터페이스 */
        .archive-list { 
            border-top: 1px solid #222; 
            animation: fadeIn 1.2s ease forwards;
        }
        
        .archive-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 45px 0; border-bottom: 1px solid #222;
            text-decoration: none; color: #fff; 
            transition: 0.5s cubic-bezier(0.19, 1, 0.22, 1);
            position: relative;
        }

        /* 호버 시 스타일 효과 */
        .archive-item:hover { 
            border-bottom-color: #fff; 
            padding-left: 20px; 
        }

        .item-title { 
            font-family: 'Playfair Display', serif; 
            font-size: 3.5vw; 
            line-height: 1; 
            transition: 0.4s; 
        }
        .archive-item:hover .item-title { 
            font-style: italic; 
        }
        
        .item-meta { 
            font-family: monospace; 
            color: #444; 
            font-size: 14px; 
            letter-spacing: 2px; 
            transition: 0.4s; 
        }
        .archive-item:hover .item-meta { 
            color: #fff; 
        }

        /* [5] 호버 시 나타나는 이미지 미리보기 */
        .preview {
            position: fixed; 
            top: 50%; 
            right: 12%; 
            transform: translateY(-50%) scale(0.8);
            width: 320px; 
            height: 450px; 
            opacity: 0; 
            pointer-events: none;
            transition: 0.6s cubic-bezier(0.19, 1, 0.22, 1); 
            z-index: 5;
            background: #111; /* 이미지 로딩 전 박스색 */
        }
        .preview img { 
            width: 100%; height: 100%; 
            object-fit: cover; 
            filter: grayscale(1); 
        }
        
        /* 호버 시 미리보기 등장 */
        .archive-item:hover .preview { 
            opacity: 1; 
            transform: translateY(-50%) scale(1); 
        }
        .archive-item:hover .preview img {
            filter: grayscale(0.2);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <header>
        <div class="nav-capsule">
            <a href="index.html">HOME</a>
            <a href="work.html" class="active">WORK</a>
            <a href="artshow.html">ART SHOW</a>
            <a href="collabration.html">COLLAB</a>
            <a href="cv.html">C.V</a>
        </div>
    </header>

    <main class="container">
        <h1 class="page-title">Selected Works</h1>
        
        <div class="archive-list">
