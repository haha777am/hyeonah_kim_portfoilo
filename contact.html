<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GET IN TOUCH — HYEON AH KIM</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=Noto+Sans+KR:wght@300;400&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0; background-color: #0b0b0b; color: #fff;
            font-family: 'Noto Sans KR', sans-serif; cursor: none;
            display: flex; align-items: center; justify-content: center; height: 100vh;
            animation: fadeInPage 1s ease forwards;
        }
        @keyframes fadeInPage { from { opacity: 0; } to { opacity: 1; } }
        body.fade-out { opacity: 0 !important; transition: opacity 0.5s ease; }

        .custom-cursor {
            position: fixed; top: 0; left: 0; width: 12px; height: 12px;
            background-color: #fff; border-radius: 50%; pointer-events: none; z-index: 9999;
            transform: translate(-50%, -50%); transition: width 0.3s ease, height 0.3s ease, mix-blend-mode: difference;
        }
        .custom-cursor.hover { width: 45px; height: 45px; background-color: transparent; border: 1px solid #fff; }

        /* 뒤로가기 버튼 */
        .back-btn {
            position: fixed; top: 50px; left: 50px;
            font-family: monospace; color: #555; text-decoration: none;
            font-size: 12px; letter-spacing: 2px; transition: 0.3s;
        }
        .back-btn:hover { color: #fff; padding-left: 10px; }

        .contact-wrapper { width: 90%; max-width: 900px; display: grid; grid-template-columns: 1fr 1.2fr; gap: 80px; }

        .contact-info h1 { font-family: 'Playfair Display', serif; font-size: 60px; margin: 0 0 20px; font-weight: 400; }
        .contact-info p { color: #888; font-size: 15px; line-height: 1.8; margin-bottom: 40px; }

        /* 폼 스타일 */
        .form-group { margin-bottom: 30px; }
        .form-group label { display: block; font-family: monospace; font-size: 11px; color: #444; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
        .form-group input, .form-group textarea {
            width: 100%; background: transparent; border: none; border-bottom: 1px solid #222;
            padding: 10px 0; color: #fff; font-family: 'Noto Sans KR', sans-serif; font-size: 16px;
            outline: none; transition: 0.4s;
        }
        .form-group input:focus, .form-group textarea:focus { border-bottom-color: #a68d60; }

        .name-row { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }

        .send-btn {
            background: #a68d60; color: #fff; border: none; padding: 15px 50px;
            font-family: monospace; letter-spacing: 2px; cursor: none; transition: 0.4s;
            margin-top: 20px;
        }
        .send-btn:hover { background: #fff; color: #000; }

        @media (max-width: 768px) {
            .contact-wrapper { grid-template-columns: 1fr; gap: 50px; padding-top: 100px; }
            .contact-info h1 { font-size: 40px; }
            .custom-cursor { display: none; }
            body { cursor: auto; }
        }
    </style>
</head>
<body>

    <div class="custom-cursor"></div>
    <a href="cv.html" class="back-btn">← BACK TO C.V</a>

    <div class="contact-wrapper">
        <div class="contact-info">
            <h1>Get in<br>Touch</h1>
            <p>I'd like to hear from you!<br>문의사항이 있거나 협업 제안이 있다면<br>언제든 메시지를 남겨주세요.</p>
        </div>

        <div class="contact-form">
            <form id="contact-form">
                <div class="name-row">
                    <div class="form-group">
                        <label>First Name</label>
                        <input type="text" name="first_name" required>
                    </div>
                    <div class="form-group">
                        <label>Last Name</label>
                        <input type="text" name="last_name" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Email *</label>
                    <input type="email" name="user_email" required>
                </div>
                <div class="form-group">
                    <label>Message</label>
                    <textarea name="message" rows="4" required></textarea>
                </div>
                <button type="submit" class="send-btn">SEND MESSAGE</button>
            </form>
        </div>
    </div>

    <script>
        const cursor = document.querySelector('.custom-cursor');
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        const interactives = document.querySelectorAll('a, button, input, textarea');
        interactives.forEach(el => {
            el.addEventListener('mouseenter', () => cursor.classList.add('hover'));
            el.addEventListener('mouseleave', () => cursor.classList.remove('hover'));
        });

        // 페이지 전환 효과
        document.querySelector('.back-btn').addEventListener('click', function(e) {
            e.preventDefault();
            document.body.classList.add('fade-out');
            setTimeout(() => { window.location.href = this.href; }, 500);
        });

        document.getElementById('contact-form').addEventListener('submit', function(e) {
            e.preventDefault();
            alert('메시지가 전송되었습니다.');
            this.reset();
        });
    </script>
</body>
</html>
