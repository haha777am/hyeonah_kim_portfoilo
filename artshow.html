<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2022 PARIS - HYEON AH KIM</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=Noto+Sans+KR:wght@300;400&display=swap" rel="stylesheet">
    <style>
        /* [1] 공통 스타일 */
        body { margin: 0; background-color: #000; color: #fff; font-family: 'Noto Sans KR', sans-serif; line-height: 1.6; }
        
        /* [2] 네비게이션 */
        header { position: fixed; top: 0; width: 100%; z-index: 1000; padding: 30px 0; display: flex; justify-content: center; }
        .nav-capsule { display: flex; background: rgba(255,255,255,0.08); border-radius: 50px; padding: 5px; backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); }
        .nav-capsule a { text-decoration: none; color: #666; padding: 10px 20px; border-radius: 50px; font-size: 13px; transition: 0.3s; }
        .nav-capsule a:hover { color: #fff; }
        .nav-capsule a.active { color: #fff; background: rgba(255,255,255,0.15); }

        /* [3] 전시 상세 레이아웃 */
        .project-container { padding: 180px 10% 100px; max-width: 1200px; margin: 0 auto; }

        .project-header { margin-bottom: 120px; border-left: 1px solid #333; padding-left: 30px; }
        .project-date { font-family: monospace; color: #555; font-size: 14px; letter-spacing: 3px; }
        .project-title { font-family: 'Playfair Display', serif; font-size: 5vw; font-weight: 400; margin: 10px 0; letter-spacing: -2px; }
        .project-location { font-family: 'Playfair Display', serif; font-style: italic; color: #888; font-size: 1.8vw; }

        /* [4] 콘텐츠 섹션 */
        section { margin-bottom: 120px; opacity: 0; transform: translateY(30px); transition: 1s all ease-out; }
        section.visible { opacity: 1; transform: translateY(0); }

        .hero-box { width: 100%; overflow: hidden; border: 1px solid #222; }
        .hero-box img { width: 100%; height: auto; display: block; filter: grayscale(10%); transition: 1s; }
        .hero-box:hover img { filter: grayscale(0%); transform: scale(1.02); }

        .grid-box { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; margin-top: 40px; }
        .grid-box img { width: 100%; height: auto; border: 1px solid #222; }

        /* 하단 네비게이션 */
        .back-nav { display: flex; justify-content: center; margin-top: 150px; border-top: 1px solid #222; padding-top: 50px; }
        .back-nav a { text-decoration: none; color: #555; font-family: monospace; font-size: 12px; letter-spacing: 2px; transition: 0.3s; }
        .back-nav a:hover { color: #fff; }
    </style>
</head>
<body>

    <header>
        <div class="nav-capsule">
            <a href="index.html">HOME</a>
            <a href="work.html">WORK</a>
            <a href="artshow.html" class="active">ART SHOW</a>
            <a href="cv.html">C.V</a>
        </div>
    </header>

    <main class="project-container">
        
        <div class="project-header">
            <span class="project-date">2022.09</span>
            <h1 class="project-title">Focus Art Fair: BOOM</h1>
            <p class="project-location">Carrousel du Louvre, Paris</p>
        </div>

        <section class="fade-in">
            <div class="hero-box">
                <img src="images/art1.jpg" alt="Paris Exhibition Main">
            </div>
        </section>

        <section class="fade-in">
            <div class="grid-box">
                <img src="images/art2.jpg" alt="Exhibition Detail 1">
                <img src="images/art3.jpg" alt="Exhibition Detail 2">
            </div>
            <p style="font-family: monospace; font-size: 11px; color: #444; margin-top: 20px; text-align: right; letter-spacing: 1px;">
                Installation View / Paris, France
            </p>
        </section>

        <div class="back-nav">
            <a href="artshow.html">BACK TO ART SHOW LIST</a>
        </div>

    </main>

    <script>
        // 스크롤 시 나타나는 애니메이션
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) entry.target.classList.add('visible');
            });
        }, { threshold: 0.1 });

        document.querySelectorAll('section').forEach(section => observer.observe(section));
    </script>

</body>
</html>
