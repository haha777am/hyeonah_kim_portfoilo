<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ART SHOW — HYEON AH KIM</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        /* [1] 기본 테마 및 페이지 전환 효과 */
        body { 
            margin: 0; background-color: #0b0b0b; color: #fff; 
            font-family: 'Noto Sans KR', sans-serif; overflow-x: hidden; 
            cursor: none; animation: fadeInPage 0.8s ease forwards;
        }
        @keyframes fadeInPage { from { opacity: 0; } to { opacity: 1; } }
        body.fade-out { opacity: 0 !important; transition: opacity 0.5s ease; }

        /* 커스텀 커서 스타일 */
        .custom-cursor {
            position: fixed; top: 0; left: 0; width: 12px; height: 12px;
            background-color: #fff; border-radius: 50%; pointer-events: none; z-index: 9999;
            transform: translate(-50%, -50%); transition: width 0.3s ease, height 0.3s ease, background-color 0.3s ease; mix-blend-mode: difference;
        }
        .custom-cursor.hover { width: 45px; height: 45px; background-color: transparent; border: 1px solid #fff; }

        /* [2] 네비게이션 */
        header { position: fixed; top: 0; width: 100%; z-index: 1000; padding: 40px 0; display: flex; justify-content: center; }
        .nav-capsule { display: flex; background: rgba(255,255,255,0.05); border-radius: 50px; padding: 6px; backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); }
        .nav-capsule a { text-decoration: none; color: #666; padding: 10px 25px; border-radius: 50px; font-size: 13px; transition: 0.4s; }
        .nav-capsule a:hover { color: #fff; }
        .nav-capsule a.active { color: #fff; background: rgba(255,255,255,0.1); }

        /* [3] 시네마틱 히어로 섹션 */
        .hero-video-section {
            height: 70vh; width: 100%; position: relative;
            overflow: hidden; display: flex; align-items: center; justify-content: center;
        }
        .hero-video-section video, .hero-video-section img {
            position: absolute; width: 100%; height: 100%; object-fit: cover;
            filter: brightness(0.4) grayscale(0.5); z-index: -1;
        }
        .hero-content { text-align: center; }
        .hero-content h1 { font-family: 'Playfair Display', serif; font-size: 8vw; margin: 0; line-height: 0.9; text-transform: uppercase; }
        .hero-content p { font-family: monospace; letter-spacing: 5px; color: #a68d60; margin-top: 20px; }

        /* [4] 4분할 아카이브 갤러리 컨테이너 */
        .container { padding: 40px 5% 200px; max-width: 1600px; margin: 0 auto; }

        /* 4열 그리드 레이아웃 설정 */
        .archive-list { display: grid; grid-template-columns: repeat(4, 1fr); gap: 30px; margin-top: 0; }
        
        /* 개별 카드 디자인 */
        .archive-item {
            display: flex; flex-direction: column; text-decoration: none; color: #fff; 
            transition: transform 0.5s cubic-bezier(0.19, 1, 0.22, 1);
        }
        .archive-item:hover { transform: translateY(-15px); }

        /* 카드 이미지 프리뷰 컨테이너 */
        .preview {
            width: 100%; height: 500px; overflow: hidden;
            margin-bottom: 25px; border: 1px solid rgba(255,255,255,0.1);
            position: relative; 
        }
        
        /* 사진-사진 스왑 설정 (컬러 유지) */
        .preview img { 
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%; object-fit: cover; display: block;
            transition: opacity 0.8s cubic-bezier(0.19, 1, 0.22, 1), transform 1.2s cubic-bezier(0.19, 1, 0.22, 1); 
        }
        
        /* 레이어 설정 */
        .photo-static { opacity: 1; z-index: 2; transform: scale(1); }
        .photo-hover { opacity: 0; z-index: 1; transform: scale(1.05); }

        /* 호버 시 스왑 효과 */
        .archive-item:hover .photo-static { opacity: 0; }
        .archive-item:hover .photo-hover { opacity: 1; transform: scale(1); }

        /* 텍스트 영역 */
        .item-main { display: flex; flex-direction: column; }
        .item-title { 
            font-family: 'Playfair Display', serif; font-size: 24px; 
            line-height: 1.2; transition: 0.4s; display: block; margin-bottom: 10px;
        }
        .archive-item:hover .item-title { font-style: italic; color: #a68d60; }
        
        .item-location { font-family: monospace; color: #888; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; }
        .item-year { font-family: 'Playfair Display', serif; color: #555; font-size: 15px; margin-top: 15px; font-weight: 700; }

        @media (max-width: 1024px) {
            .archive-list { grid-template-columns: repeat(2, 1fr); gap: 40px; }
            .preview { height: 450px; }
        }
        @media (max-width: 768px) {
            .hero-content h1 { font-size: 15vw; }
            .archive-list { grid-template-columns: 1fr; gap: 50px; }
            .preview { height: 400px; }
            .custom-cursor { display: none; }
            body { cursor: auto; }
            .photo-hover { display: none; }
            .photo-static { opacity: 1 !important; }
        }
    </style>
</head>
<body>

    <div class="custom-cursor"></div>

    <header>
        <div class="nav-capsule">
            <a href="index.html">HOME</a>
            <a href="work.html">WORK</a>
            <a href="artshow.html" class="active">ART SHOW</a>
            <a href="collab.html">COLLAB</a>
            <a href="cv.html">C.V</a>
        </div>
    </header>

    <section class="hero-video-section">
        <img src="images/art_hero_bg.jpg" alt="Exhibition Highlight">
        <div class="hero-content">
            <p>FASHION SHOW + EXPOSITION</p>
            <h1>ART SHOW</h1>
        </div>
    </section>

    <main class="container">
        <div class="archive-list">
            
            <a href="boom_paris.html" class="archive-item">
                <div class="preview">
                    <img src="images/art_2022_paris.jpg" alt="Paris 2022 Static" class="photo-static">
                    <img src="images/art_2022_paris_hover.jpg" alt="Paris 2022 Hover" class="photo-hover">
                </div>
                <div class="item-main">
                    <span class="item-title">Focus: BOOM</span>
                    <span class="item-location">Carrousel du Louvre, Paris</span>
                    <span class="item-year">2022</span>
                </div>
            </a>

            <a href="color_london.html" class="archive-item">
                <div class="preview">
                    <img src="images/3/01.jpg" alt="London 2021 Static" class="photo-static">
                    <img src="images/3/02.jpg" alt="London 2021 Hover" class="photo-hover">
                </div>
                <div class="item-main">
                    <span class="item-title">Color of Life</span>
                    <span class="item-location">Saatchi Gallery, London</span>
                    <span class="item-year">2021</span>
                </div>
            </a>

            <a href="identity_paris.html" class="archive-item">
                <div class="preview">
                    <img src="images/2/affiche.jpg" alt="Identity Static" class="photo-static">
                    <img src="images/2/01.jpg" alt="Identity Hover" class="photo-hover">
                </div>
                <div class="item-main">
                    <span class="item-title">Focus: Identity</span>
                    <span class="item-location">Atelier Richelieu, Paris</span>
                    <span class="item-year">2021</span>
                </div>
            </a>

            <a href="color_3_paris.html" class="archive-item">
                <div class="preview">
                    <img src="images/1/etude.jpg" alt="Color of 3 Static" class="photo-static">
                    <img src="images/1/main.jpg" alt="Color of 3 Hover" class="photo-hover">
                </div>
                <div class="item-main">
                    <span class="item-title">Color of 3</span>
                    <span class="item-location">Espace Thorigny, Paris</span>
                    <span class="item-year">2020</span>
                </div>
            </a>

        </div>
    </main>

    <script>
        const cursor = document.querySelector('.custom-cursor');
        const links = document.querySelectorAll('a');

        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        links.forEach(link => {
            link.addEventListener('mouseenter', () => { cursor.classList.add('hover'); });
            link.addEventListener('mouseleave', () => { cursor.classList.remove('hover'); });
        });
    </script>
</body>
</html>
