<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHOW ARCHIVE — HYEON AH KIM</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=Noto+Sans+KR:wght@300;400&display=swap" rel="stylesheet">
    <style>
        /* [1] 기본 테마 및 전환 효과 */
        body { margin: 0; background-color: #0b0b0b; color: #fff; font-family: 'Noto Sans KR', sans-serif; cursor: none; animation: fadeInPage 0.8s ease forwards; overflow-x: hidden; }
        @keyframes fadeInPage { from { opacity: 0; } to { opacity: 1; } }
        body.fade-out { opacity: 0 !important; transition: opacity 0.5s ease; }

        /* 커스텀 커서 */
        .custom-cursor { position: fixed; top: 0; left: 0; width: 12px; height: 12px; background-color: #fff; border-radius: 50%; pointer-events: none; z-index: 9999; transform: translate(-50%, -50%); transition: width 0.3s ease, height 0.3s ease; mix-blend-mode: difference; }
        .custom-cursor.hover { width: 45px; height: 45px; background-color: transparent; border: 1px solid #fff; }

        /* 네비게이션 */
        header { position: fixed; top: 0; width: 100%; z-index: 1000; padding: 40px 5%; box-sizing: border-box; mix-blend-mode: difference; }
        .back-btn { font-family: monospace; color: #fff; text-decoration: none; font-size: 13px; letter-spacing: 2px; transition: 0.3s; }
        .back-btn:hover { opacity: 0.5; padding-left: 10px; }

        /* 레이아웃 */
        .show-container { padding: 150px 5% 100px; max-width: 1400px; margin: 0 auto; }
        .show-hero { margin-bottom: 80px; border-bottom: 1px solid #222; padding-bottom: 40px; }
        .show-hero h1 { font-family: 'Playfair Display', serif; font-size: 6vw; margin: 0; line-height: 1.1; }
        .show-hero h1 span { font-style: italic; color: #a68d60; }
        .show-meta { display: flex; gap: 40px; margin-top: 30px; font-family: monospace; font-size: 13px; color: #555; letter-spacing: 2px; text-transform: uppercase; }

        .show-info { display: grid; grid-template-columns: 1fr 1.5fr; gap: 80px; margin-bottom: 100px; }
        .info-title { font-size: 20px; font-weight: 300; line-height: 1.5; color: #ccc; }
        .info-text { font-size: 16px; font-weight: 300; line-height: 2; color: #777; text-align: justify; }

        /* 갤러리 */
        .show-gallery { display: grid; grid-template-columns: repeat(12, 1fr); gap: 20px; }
        .gallery-item { overflow: hidden; background: #111; }
        .gallery-item img { width: 100%; height: auto; display: block; filter: grayscale(100%); transition: 0.8s; }
        .gallery-item:hover img { filter: grayscale(0%); transform: scale(1.05); }

        /* 그리드 변형 */
        .wide { grid-column: span 8; }
        .narrow { grid-column: span 4; margin-top: 50px; }
        .full { grid-column: span 12; margin: 60px 0; }

        @media (max-width: 768px) {
            .show-info { grid-template-columns: 1fr; }
            .show-hero h1 { font-size: 10vw; }
            .show-gallery { display: flex; flex-direction: column; }
            .narrow { margin-top: 0; }
            .custom-cursor { display: none; }
            body { cursor: auto; }
        }
    </style>
</head>
<body>
    <div class="custom-cursor"></div>

    <header>
        <a href="artshow.html" class="back-btn">← BACK TO ARCHIVE</a>
    </header>

    <main class="show-container">
        <div class="show-hero">
            <h1>Focus: <span>BOOM</span></h1> 
            <div class="show-meta">
                <span>Location Name</span> <span>Year</span> <span>Exhibition</span>
            </div>
        </div>

        <div class="show-info">
            <div class="info-title">전시 제목이나 짧은 슬로건</div> <div class="info-text">상세 설명을 여기에 적어주세요.</div> </div>

        <div class="show-gallery">
            <div class="gallery-item wide"><img src="images/사진1.jpg" alt=""></div> 
            <div class="gallery-item narrow"><img src="images/사진2.jpg" alt=""></div>
            <div class="gallery-item full"><img src="images/사진3.jpg" alt=""></div>
        </div>
    </main>

    <script>
        // 커서 및 페이드 효과 통합 스크립트
        const cursor = document.querySelector('.custom-cursor');
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        document.querySelectorAll('a').forEach(link => {
            link.addEventListener('mouseenter', () => cursor.classList.add('hover'));
            link.addEventListener('mouseleave', () => cursor.classList.remove('hover'));
            link.addEventListener('click', function(e) {
                if (this.target === '_blank') return;
                e.preventDefault();
                const targetUrl = this.href;
                document.body.classList.add('fade-out');
                setTimeout(() => { window.location.href = targetUrl; }, 500);
            });
        });

        // 뒤로가기 시 흰 화면 방지
        window.addEventListener('pageshow', function(e) {
            if (e.persisted || (window.performance && window.performance.navigation.type === 2)) {
                document.body.classList.remove('fade-out');
            }
        });
    </script>
</body>
</html>
